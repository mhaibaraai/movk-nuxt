packages:
  - playgrounds/*
  - docs

ignoreWorkspaceRootCheck: true
linkWorkspacePackages: true

allowBuilds:
  '@parcel/watcher': false
  better-sqlite3: true
  esbuild: false
  sharp: true
  unrs-resolver: false
  vue-demi: false

minimumReleaseAgeExclude:
  - '@ai-sdk/gateway@3.0.122'
  - '@ai-sdk/vue@3.0.194'
  - '@iconify-json/simple-icons@1.2.85'
  - '@movk/core@1.3.0'
  - '@movk/nuxt-docs@1.19.4'
  - ai@6.0.194
