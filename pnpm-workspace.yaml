packages:
  - playgrounds/*
  - docs

allowBuilds:
  '@parcel/watcher': false
  better-sqlite3: true
  esbuild: false
  sharp: true
  unrs-resolver: false
  vue-demi: false

minimumReleaseAgeExclude:
  - '@iconify-json/vscode-icons@1.2.50'
  - '@nuxt/content@3.14.0'
  - '@nuxt/kit@4.4.6'
  - '@nuxt/nitro-server@4.4.6'
  - '@nuxt/schema@4.4.6'
  - '@nuxt/vite-builder@4.4.6'
  - '@vue/language-core@3.3.0'
  - nuxt@4.4.6
  - vue-tsc@3.3.0

overrides:
  '@nuxt/content': ^3.14.0
