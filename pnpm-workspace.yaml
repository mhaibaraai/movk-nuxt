packages:
  - playgrounds/*
  - docs

ignoreWorkspaceRootCheck: true
linkWorkspacePackages: true
minimumReleaseAge: 0
blockExoticSubdeps: false

overrides:
  '@movk/core': https://pkg.pr.new/@movk/core@112

allowBuilds:
  '@parcel/watcher': false
  better-sqlite3: true
  esbuild: false
  sharp: true
  unrs-resolver: false
  vue-demi: false
